server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Brotli / Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff2;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
        # index.html: never cache so users always get the latest shell
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed JS/CSS assets — safe to cache long-term
    location ~* \.(js|css|woff2|woff|ttf|eot|ico|png|jpg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API proxy (used when nginx fronts the whole stack)
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # WebSocket proxy (STOMP/SockJS)
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
